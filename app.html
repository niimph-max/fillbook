<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <title>Fillbook</title>
  <script src="js/supabase-config.js"></script>
  <script>
    // Gate: if cloud accounts are configured, require a session (else → login).
    // If not configured, fall back to the local-mode onboarding gate.
    (function () {
      try {
        var hasCloud = !!(window.OZL_SUPABASE_URL && window.OZL_SUPABASE_ANON_KEY);
        if (hasCloud) {
          var signedIn = false;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (/^sb-.*-auth-token$/.test(k) && localStorage.getItem(k)) { signedIn = true; break; }
          }
          if (!signedIn) {
            var p = decodeURIComponent(location.pathname || '');
            location.replace(/optionzlog app\.html$/i.test(p) ? 'OptionzLog Login.html' : 'login.html');
          }
        } else if (!localStorage.getItem('ozl_onboarded')) {
          var path = decodeURIComponent(location.pathname || '');
          location.replace(/optionzlog app\.html$/i.test(path) ? 'OptionzLog Onboarding.html' : 'onboarding.html');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fillbook" />
  <link rel="stylesheet" href="styles.css" />
  <!-- i18n: TH⇄EN. Dictionary first, then runtime; both before React. -->
  <script>window.OZL_NO_PILL = true;</script>
  <script src="js/i18n-en.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    // PWA: register service worker (installable + offline shell)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</head>
