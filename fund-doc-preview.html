<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>พรีวิว — ใบสรุปการลงทุน</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="js/fund-calc.js"></script>
  <style>body{margin:0;background:var(--bg,#0f1115)}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react">
    // minimal Icon stub
    function Icon({ name, size = 18, style }) {
      return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={style}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>;
    }
    window.Icon = Icon;
  </script>
  <script type="text/babel" src="js/fund-doc.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const FC = window.FundCalc;
    const partners = [
      { id: 'A', name: 'ปฐมพร ลิ้นทอง', color: '#5B9DFF' },
      { id: 'B', name: 'พุทรา ลิ้นทอง', color: '#E58BE5' },
      { id: 'C', name: 'นวลจันทร์ ลิ้นทอง', color: '#F5B84B' },
    ];
    const txns = [
      { id: 1, partner_id: 'A', date: '2025-11-03', type: 'deposit', amount_thb: 300000, nlv_before_thb: 600000, seq: 1 },
      { id: 2, partner_id: 'B', date: '2025-11-03', type: 'deposit', amount_thb: 150000, nlv_before_thb: 600000, seq: 2 },
      { id: 3, partner_id: 'C', date: '2025-11-03', type: 'deposit', amount_thb: 150000, nlv_before_thb: 600000, seq: 3 },
      { id: 4, partner_id: 'A', date: '2026-04-15', type: 'withdraw', amount_thb: 75000, nlv_before_thb: 750000, seq: 4 },
      { id: 5, partner_id: 'B', date: '2026-04-15', type: 'withdraw', amount_thb: 37500, nlv_before_thb: 750000, seq: 5 },
      { id: 6, partner_id: 'C', date: '2026-04-15', type: 'withdraw', amount_thb: 37500, nlv_before_thb: 750000, seq: 6 },
    ];
    const fx = 32.5, nlvUsd = 23214;
    const { rows, totalUnits } = FC.computeUnits(txns);
    const totalThb = FC.fundTotalThb(nlvUsd, fx, { gold_qty: 0, gold_price_thb: 0, cash_thb: 0 });
    const people = FC.partnerBreakdown(rows, totalUnits, totalThb).sort((a, b) => b.units - a.units);

    function App() {
      const [open, setOpen] = React.useState(true);
      return (
        <div style={{ padding: 40, color: 'var(--text,#eee)', fontFamily: 'var(--font-sans,sans-serif)' }}>
          <button className="btn" onClick={() => setOpen(true)}>เปิดเอกสาร</button>
          {open && <window.FundStatement
            onClose={() => setOpen(false)}
            partners={partners} people={people} rows={rows}
            totalThb={totalThb} totalUnits={totalUnits} fx={fx}
            latestNlvUsd={nlvUsd} latestDate="2026-07-06"
            assets={{ gold_qty: 0, gold_price_thb: 0, cash_thb: 0 }}
            accountName="กองทุนบ้านสิงห์ทอง · Baan Singthong Fund" />}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
